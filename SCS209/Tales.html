
<html>
<head>
    <title>Transport Form</title>
</head>
<body>

<h2>WHAT TYPE OF TRANSPORT DO YOU LIKE</h2>

<form>
    <label>BIKE</label>
    <input type="checkbox" name="transport" value="bike"><br>

    <label>CAR</label>
    <input type="checkbox" name="transport" value="car"><br>

    <label>AIRPLANE</label>
    <input type="checkbox" name="transport" value="airplane" checked><br><br>

    <p><b>SELECT YOUR FAVOURITE CAR</b></p>

    <select>
        <option>Volvo</option>
        <option>Saab</option>
        <option>Fiat</option>
        <option>Audi</option>
    </select>

    <br><br>
    <input type="submit" value="SUBMIT">
</form>

</body>
</html>
